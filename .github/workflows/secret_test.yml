name: secret-scope-probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  job1_uses_secret:
    runs-on: ubuntu-latest
    steps:
      - name: Use custom secret in job1
        env:
          PROBE_SECRET: ${{ secrets.PROBE_SECRET }}
        run: |
          if [ -n "$PROBE_SECRET" ]; then
            echo "job1: PROBE_SECRET is present"
          else
            echo "job1: PROBE_SECRET is NOT present"
            exit 1
          fi

      - name: Show GITHUB_TOKEN availability in job1
        env:
          GH_TOKEN_PROBE: ${{ github.token }}
        run: |
          if [ -n "$GH_TOKEN_PROBE" ]; then
            echo "job1: github.token is present"
          else
            echo "job1: github.token is NOT present"
          fi

  job2_rce_probe:
    needs: job1_uses_secret
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe custom secret reachability from job2
        run: |
          # 这里故意不把 secrets.PROBE_SECRET 显式映射到 env
          if [ -n "${PROBE_SECRET:-}" ]; then
            echo "job2: unexpected - PROBE_SECRET leaked into env"
          else
            echo "job2: PROBE_SECRET not present in env (expected)"
          fi

      - name: Probe github.token / GITHUB_TOKEN reachability from job2
        env:
          GH_TOKEN_PROBE: ${{ github.token }}
        run: |
          if [ -n "$GH_TOKEN_PROBE" ]; then
            echo "job2: github.token is present (expected)"
          else
            echo "job2: github.token is NOT present"
          fi

      - name: Probe direct secret expression in job2 without mapping
        run: |
          # 注意：这里只是利用 workflow 表达式求值来观察“这个 job 能否读到该 secret”
          # 如果你想更严格模拟“RCE时仅凭进程环境能否看到 secret”，就看上一步即可
          if [ -n "${{ secrets.PROBE_SECRET }}" ]; then
            echo "job2: secrets.PROBE_SECRET expression resolves"
          else
            echo "job2: secrets.PROBE_SECRET expression does NOT resolve"
          fi

  job3_uses_secret_again:
    needs: job2_rce_probe
    runs-on: ubuntu-latest
    steps:
      - name: Use custom secret in job3
        env:
          PROBE_SECRET: ${{ secrets.PROBE_SECRET }}
        run: |
          if [ -n "$PROBE_SECRET" ]; then
            echo "job3: PROBE_SECRET is present"
          else
            echo "job3: PROBE_SECRET is NOT present"
            exit 1
          fi

      - name: Show GITHUB_TOKEN availability in job3
        env:
          GH_TOKEN_PROBE: ${{ github.token }}
        run: |
          if [ -n "$GH_TOKEN_PROBE" ]; then
            echo "job3: github.token is present"
          else
            echo "job3: github.token is NOT present"
          fi
