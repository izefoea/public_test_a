name: WR Branch Filter Probe - main

on:
  workflow_run:
    workflows: ["PR Branch Probe Upstream"]
    types: [completed]
    branches: [main]

jobs:
  dump-workflow-run-context:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Print workflow_run context
        env:
          WR_JSON: ${{ toJson(github.event.workflow_run) }}
          FULL_EVENT_JSON: ${{ toJson(github.event) }}
        run: |
          echo "This workflow fired."
          echo "workflow_run.name=${{ github.event.workflow_run.name }}"
          echo "workflow_run.event=${{ github.event.workflow_run.event }}"
          echo "workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "workflow_run.run_number=${{ github.event.workflow_run.run_number }}"
          echo "workflow_run.run_attempt=${{ github.event.workflow_run.run_attempt }}"
          echo "workflow_run.html_url=${{ github.event.workflow_run.html_url }}"
          echo "workflow_run.head_repository=${{ github.event.workflow_run.head_repository.full_name }}"
          echo "workflow_run.repository=${{ github.event.workflow_run.repository.full_name }}"
          echo "workflow_run.pull_requests=${{ toJson(github.event.workflow_run.pull_requests) }}"

          printf '%s\n' "$WR_JSON" > workflow_run.json
          printf '%s\n' "$FULL_EVENT_JSON" > full_event.json

      - name: Upload probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: wr-branch-filter-main
          path: |
            workflow_run.json
            full_event.json
