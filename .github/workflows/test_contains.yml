name: Test contains behavior

on:
  workflow_dispatch:

env:
  TRUSTED_USERS_STRING: 'RodolfoGS awinograd hesyifei LinusU SimenB actuallymentor derekstavis wscotten wcandillon tevonsb MaRaSu devashishsethia bndkt'
  TRUSTED_USERS_JSON: '["RodolfoGS","awinograd","hesyifei","LinusU","SimenB","actuallymentor","derekstavis","wscotten","wcandillon","tevonsb","MaRaSu","devashishsethia","bndkt"]'

jobs:
  test-contains:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        login:
          - LinusU
          - Linus
          - SimenB
          - Simen
          - mentor
          - Rodolfo
          - randomuser

    steps:
      - name: Show current test case
        run: |
          echo "testing login=${{ matrix.login }}"
          echo "TRUSTED_USERS_STRING=$TRUSTED_USERS_STRING"
          echo "TRUSTED_USERS_JSON=$TRUSTED_USERS_JSON"

      - name: String contains matched
        if: ${{ contains(env.TRUSTED_USERS_STRING, matrix.login) }}
        run: echo "string contains == true for ${{ matrix.login }}"

      - name: String contains not matched
        if: ${{ !contains(env.TRUSTED_USERS_STRING, matrix.login) }}
        run: echo "string contains == false for ${{ matrix.login }}"

      - name: Array contains matched
        if: ${{ contains(fromJSON(env.TRUSTED_USERS_JSON), matrix.login) }}
        run: echo "array contains == true for ${{ matrix.login }}"

      - name: Array contains not matched
        if: ${{ !contains(fromJSON(env.TRUSTED_USERS_JSON), matrix.login) }}
        run: echo "array contains == false for ${{ matrix.login }}"
