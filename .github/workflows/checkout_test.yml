name: Checkout Behavior Matrix

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  matrix-checkout:
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/checkout-test')
    runs-on: ubuntu-latest

    steps:
      - name: Fetch PR data
        id: pr
        uses: octokit/request-action@v3
        with:
          route: GET /repos/{repo}/pulls/{number}
          repo: ${{ github.repository }}
          number: ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract fields
        id: vars
        shell: bash
        run: |
          PR_JSON='${{ steps.pr.outputs.data }}'
          echo "base_repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "head_repo=$(jq -r '.head.repo.full_name' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(jq -r '.head.ref' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -r '.head.sha' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(jq -r '.base.ref' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"

      - name: Print PR info
        run: |
          echo "base_repo = ${{ steps.vars.outputs.base_repo }}"
          echo "head_repo = ${{ steps.vars.outputs.head_repo }}"
          echo "head_ref  = ${{ steps.vars.outputs.head_ref }}"
          echo "head_sha  = ${{ steps.vars.outputs.head_sha }}"
          echo "base_ref  = ${{ steps.vars.outputs.base_ref }}"

      # Case 1: no ref
      - name: Case 1 - checkout default (no ref)
        uses: actions/checkout@v6
        with:
          path: case1-default

      - name: Inspect case 1
        shell: bash
        run: |
          cd case1-default
          echo "CASE1 repo remote:"
          git remote -v
          echo "CASE1 HEAD:"
          git rev-parse HEAD
          echo "CASE1 branches:"
          git branch -a || true

      # Case 2: ref=head.ref on base repo
      - name: Case 2 - checkout head.ref on base repo
        id: case2
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.head_ref }}
          path: case2-head-ref-base

      - name: Inspect case 2
        if: always()
        shell: bash
        run: |
          echo "CASE2 outcome = ${{ steps.case2.outcome }}"
          if [ -d case2-head-ref-base/.git ]; then
            cd case2-head-ref-base
            echo "CASE2 repo remote:"
            git remote -v
            echo "CASE2 HEAD:"
            git rev-parse HEAD
            echo "CASE2 branches:"
            git branch -a || true
          fi

      # Case 3: ref=head.ref on head repo
      - name: Case 3 - checkout head.ref on head repo
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.vars.outputs.head_repo }}
          ref: ${{ steps.vars.outputs.head_ref }}
          path: case3-head-ref-headrepo

      - name: Inspect case 3
        shell: bash
        run: |
          cd case3-head-ref-headrepo
          echo "CASE3 repo remote:"
          git remote -v
          echo "CASE3 HEAD:"
          git rev-parse HEAD
          echo "CASE3 branches:"
          git branch -a || true

      # Case 4: ref=head.sha on base repo context
      - name: Case 4 - checkout head.sha
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.head_sha }}
          path: case4-head-sha

      - name: Inspect case 4
        shell: bash
        run: |
          cd case4-head-sha
          echo "CASE4 repo remote:"
          git remote -v
          echo "CASE4 HEAD:"
          git rev-parse HEAD
          echo "CASE4 branches:"
          git branch -a || true

      - name: Compare SHAs
        shell: bash
        run: |
          echo "Expected PR head SHA: ${{ steps.vars.outputs.head_sha }}"
          echo "Case1 actual: $(git -C case1-default rev-parse HEAD)"
          if [ -d case2-head-ref-base/.git ]; then
            echo "Case2 actual: $(git -C case2-head-ref-base rev-parse HEAD)"
          else
            echo "Case2 actual: <checkout failed>"
          fi
          echo "Case3 actual: $(git -C case3-head-ref-headrepo rev-parse HEAD)"
          echo "Case4 actual: $(git -C case4-head-sha rev-parse HEAD)"
