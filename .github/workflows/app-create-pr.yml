name: app create pr test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: navikt/github-app-token-generator@v1
        with:
          private-key: ${{ secrets.BOT_APP_KEY }}
          app-id: ${{ secrets.BOT_APP_ID }}

      - name: Checkout default branch with App token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Create branch and commit as app identity
        shell: bash
        run: |
          BRANCH="app-token-pr-test-$(date +%s)"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"

          mkdir -p actor-test
          {
            echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "created_by_workflow=app-create-pr.yml"
          } > actor-test/probe.txt

          git add actor-test/probe.txt
          git -c user.name="app-token-test" -c user.email="app-token-test@users.noreply.github.com" \
            commit -m "test: create PR via GitHub App token"

      - name: Push branch with App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git push origin "HEAD:${BRANCH}"

      - name: Create PR with App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${BRANCH}" \
            --title "App token actor test" \
            --body "This PR was created by a workflow using a GitHub App installation token."
